"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
show_hidden = true
ratio = [1, 1, 2]
sort_by = "natural"
sort_sensitive = true
sort_dir_first = true
linemode = "size"
show_symlink = true
mouse_events = ["click", "scroll", "touch", "move", "drag"]

[preview]
wrap = "no"
tab_size = 3
max_width = 1200
max_height = 1800
image_delay = 90

[[plugin.prepend_fetchers]]
id = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
url = "*/"
run = "git"
